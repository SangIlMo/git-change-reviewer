name: 'PR Change Annotations'
description: 'Automatically annotate PR changes with AI-generated intent explanations'
inputs:
  github-token:
    description: 'GitHub token for posting review comments'
    required: true
  pr-number:
    description: 'PR number to annotate'
    required: true
  max-comments:
    description: 'Maximum comments per review'
    required: false
    default: '50'
  concurrency:
    description: 'Max concurrent AI annotation requests'
    required: false
    default: '5'
  anthropic-api-key:
    description: 'Anthropic API key for AI annotations'
    required: true
runs:
  using: 'node20'
  main: 'dist/cli/index.js'
